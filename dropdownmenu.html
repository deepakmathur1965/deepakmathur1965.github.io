<html>
<head>
<style>

body{
   margin:0;
   font-family:Arial;
}

ul{
   list-style:none;
   margin:0;
   padding:0;
   background:#333;
   overflow:hidden;
}

li{
   float:left;
   position:relative;
}

li a{
   display:block;
   color:white;
   padding:14px 20px;
   text-decoration:none;
}

li a:hover{
   background:orange;
}

/* Dropdown menu */
.dropdown-content{
   display:none;
   position:absolute;
   background:white;
   min-width:160px;
   box-shadow:0 0 5px gray;
}

.dropdown-content a{
   color:black;
   padding:12px;
   display:block;
}

.dropdown-content a:hover{
   background:#ddd;
}

/* Show dropdown */
.dropdown:hover .dropdown-content{
   display:block;
}

</style>
</head>

<body>

<ul>
   <li><a href="#">Home</a></li>

   <li class="dropdown">
      <a href="#">Products</a>

      <div class="dropdown-content">
         <a href="#">Mobile</a>
         <a href="#">Laptop</a>
         <a href="#">TV</a>
      </div>
   </li>

   <li><a href="#">About</a></li>
   <li><a href="#">Contact</a></li>
</ul>

</body>
</html>
